services:
  # 1. Database
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: fireuser
      POSTGRES_PASSWORD: firepassword
      POSTGRES_DB: fireguard_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U fireuser -d fireguard_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. PostgreSQL Database for Keycloak
  keycloak_db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: keycloak_user
      POSTGRES_PASSWORD: keycloak_password
      POSTGRES_DB: keycloak_db
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U keycloak_user -d keycloak_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Redis (For Event Triggering and Caching)
  redis:
    image: redis:7-alpine
    restart: always

  # 4. HiveMQ MQTT Broker (NEW)
  hivemq:
    image: hivemq/hivemq-ce:latest
    restart: always
    ports:
      - "1883:1883"   # Standard MQTT Port for the Backend to publish
      # Port 8000 is internal for WebSockets, shielded by Nginx
    volumes:
      - hivemq_data:/opt/hivemq/data

  # 5. FastAPI Backend
  backend:
    build: ./backend
    restart: always
    depends_on:
      - db
      - keycloak
      - redis
      - hivemq # Backend needs MQTT to publish alerts
    environment:
      DATABASE_URL: postgresql+asyncpg://fireuser:firepassword@db:5432/fireguard_db
      REDIS_URL: redis://redis:6379/0

  # 6. Intelligence System
  intelligence:
    build: ./intelligence-system
    restart: always
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql+asyncpg://fireuser:firepassword@db:5432/fireguard_db
      REDIS_URL: redis://redis:6379/0

  # 7. Frontend + Nginx Proxy
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: always
    ports:
      - "80:80"  # This is the ONLY port exposed to the internet
      - "443:443" # Open HTTPS port
    depends_on:
      - backend
      - keycloak
      - hivemq # Nginx needs HiveMQ running to proxy WebSockets
    volumes:
      - ./nginx-selfsigned.crt:/etc/nginx/ssl/cert.crt:ro
      - ./nginx-selfsigned.key:/etc/nginx/ssl/cert.key:ro

  # 8. Keycloak Auth Server
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Tell Keycloak it is running behind Nginx
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "false" # Allows access via raw IP address instead of domain
      KC_HTTP_RELATIVE_PATH: /auth/ # Forces Keycloak to serve from /auth/ to match Nginx
      KC_HOSTNAME_STRICT_HTTPS: "false" # Forces Keycloak to allow HTTP requests
      KC_HTTP_ENABLED: "true" # Forces Keycloak to allow HTTP requests
      KC_HOSTNAME_URL: "https://158.37.63.48/auth/" # Set the public URL for Keycloak
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak_db:5432/keycloak_db
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: keycloak_password

volumes:
  postgres_data:
  keycloak_data:
  hivemq_data:
